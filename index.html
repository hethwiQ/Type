<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>&lt;?&gt;</title>
    <meta property="og:title" content="&lt;?&gt;">
    <meta property="og:type" content="website">
    <meta name="twitter:title" content="&lt;?&gt;">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

    <link rel="mask-icon" href="img/safari-pinned-tab.svg" color="#25ff00">
    <meta name="msapplication-TileColor" content="#050505">
    <meta name="theme-color" content="#050505">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400&display=swap');

        body {
            background-color: #050505;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .term-green {
            color: #25ff00;
            text-shadow: 0 0 2px rgba(203, 254, 182, 0.7);
            letter-spacing: 0.06em;
            font-size: clamp(0.95rem, 2.8vw, 1.25rem);
            font-family: "Source Code Pro", monospace;
            font-style: normal;
            font-weight: 400;
            line-height: 1.6rem;
            text-transform: uppercase;
        }

        .line {
            display: block;
            margin-bottom: 6px;
            white-space: pre-wrap;
            word-break: normal;
            overflow-wrap: break-word;
        }

        .time {
            font-style: italic;
        }

        .date-header {
            color: #25ff00;
            opacity: 0.5;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        /* --- UPDATED: Visual Hierarchy for System Messages --- */
        .sys-prompt {
            color: #1a9900; /* Darker green to push system prompts into the background */
            margin-right: 4px;
        }

        .system-msg {
            color: #ffffff; /* Muted, slightly pastel green */
            opacity: 0.8;
            font-size: 0.9em; /* Slightly smaller to emphasize sub-processes */
            font-style: italic;
        }

        .term-link {
            color: #25ff00;
            text-decoration: underline;
            cursor: pointer;
        }

        #cursor-tooltip {
            position: fixed;
            background-color: #111;
            color: #25ff00;
            padding: 2px 6px;
            font-size: 0.65rem;
            border: 1px solid #25ff00;
            border-radius: 2px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none; 
            z-index: 9999;
            transition: opacity 0.1s ease;
            font-family: "Source Code Pro", monospace;
        }

        /* TYPING INDICATOR DISABLED
        #typing-indicator-line {
            display: none;
            margin-bottom: 4px;
        }
        .dots::after {
            content: '';
            animation: blinkDots 1.5s steps(4, end) infinite;
        }
        @keyframes blinkDots {
            0%, 100% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        */

        .Cursor_cursor__2bnRT {
            animation: Cursor_cursor__2bnRT 1.2s infinite;
        }

        @keyframes Cursor_cursor__2bnRT {
            0% { opacity: 0; }
            60%, 80% { opacity: 1; }
            81%, 100% { opacity: 0; }
        }

        .cursor-start {
            cursor: pointer;
        }

        #mobile-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
            border: none;
            padding: 0;
            margin: 0;
            font-size: 16px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div id="cursor-tooltip">CTRL + CLICK TO OPEN LINK</div>

    <div class="term-green" id="terminal">
        <div id="chat-history"></div>

        <!-- TYPING INDICATOR DISABLED
        <div class="line" id="typing-indicator-line"><span class="prompt">&gt;&gt; </span>[<span class="dots"></span>]</div>
        -->

        <div class="line active-line"><span class="prompt"></span><span class="text"></span><span id="main-cursor"
                class="Cursor_cursor__2bnRT cursor cursor-start">&lt;?&gt;</span><input type="text" id="mobile-input"
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onValue, get, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaTjcne7xS1vjS7Tr14WfmWQmZSPhZ_lA",
            authDomain: "truth-terminal.firebaseapp.com",
            databaseURL: "https://truth-terminal-default-rtdb.firebaseio.com",
            projectId: "truth-terminal",
            storageBucket: "truth-terminal.firebasestorage.app",
            messagingSenderId: "759983527117",
            appId: "1:759983527117:web:df735315b379cd9bee0584",
            measurementId: "G-TFB06KC8N9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        const SYSTEM_HASH = "c92bcb2ea7bb84e1c56bd8e0f16b9f01fc8fb928de8ce5f71ca91cb84cc753dd";
        let userPassphrase = ""; 

        const mySessionId = Math.random().toString(36).substring(2, 10);

        async function hashText(text) {
            const msgBuffer = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function deriveUniqueKey(passphrase, saltBytes) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]
            );
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: saltBytes, iterations: 100000, hash: "SHA-256" },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptMessage(plaintext) {
            const saltBytes = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            
            const messageKey = await deriveUniqueKey(userPassphrase, saltBytes);
            const encoded = new TextEncoder().encode(plaintext);
            
            const ciphertext = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                messageKey,
                encoded
            );
            
            return {
                cipher: btoa(String.fromCharCode(...new Uint8Array(ciphertext))),
                iv: btoa(String.fromCharCode(...iv)),
                salt: btoa(String.fromCharCode(...saltBytes))
            };
        }

        async function decryptMessage(cipherB64, ivB64, saltB64) {
            try {
                const ciphertext = new Uint8Array(atob(cipherB64).split("").map(c => c.charCodeAt(0)));
                const iv = new Uint8Array(atob(ivB64).split("").map(c => c.charCodeAt(0)));
                const saltBytes = new Uint8Array(atob(saltB64).split("").map(c => c.charCodeAt(0)));
                
                const messageKey = await deriveUniqueKey(userPassphrase, saltBytes);
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    messageKey,
                    ciphertext
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[UNAUTHORIZED: ENCRYPTED_LOG_GIBBERISH]";
            }
        }

        let terminalState = "START";
        let unsubChildAdded = null;
        let unsubValue = null;
        let lastRenderedDate = null;
        
        let lastMessageTime = 0; 
        const RATE_LIMIT_MS = 1500; 

        const activeLine = document.querySelector('.active-line');
        const textSpan = activeLine.querySelector('.text');
        const promptSpan = activeLine.querySelector('.prompt'); 
        const chatHistory = document.getElementById('chat-history');
        const mainCursor = document.getElementById('main-cursor');
        const mobileInput = document.getElementById('mobile-input');
        const cursorTooltip = document.getElementById('cursor-tooltip'); 

        let connectionVerified = false;
        const connectionTimeout = setTimeout(() => {
            if (!connectionVerified) {
                terminalState = "OVERFLOW";
                document.body.innerHTML = '<div class="term-green" style="font-style: italic;">&gt;&gt; ERROR: OVERSESSION EXCEEDED. SERVER FULL.</div>';
            }
        }, 5000);

        onValue(ref(db, ".info/connected"), (snap) => {
            if (snap.val() === true) {
                connectionVerified = true;
                clearTimeout(connectionTimeout);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if(terminalState !== "OVERFLOW") mobileInput.focus();
        });

        document.addEventListener('click', () => {
            if(terminalState !== "OVERFLOW") mobileInput.focus();
        });

        function wakeTerminal() {
            if (terminalState === "START" && terminalState !== "OVERFLOW") {
                terminalState = "LOGIN";
                promptSpan.textContent = '> ENTER SYSTEM KEY: ';
                mainCursor.classList.remove('cursor-start');
                mobileInput.focus();
            }
        }

        mainCursor.addEventListener('click', wakeTerminal);

        // TYPING INDICATOR DISABLED
        function updateTypingState(isTyping) { /* Disabled */ }

        mobileInput.addEventListener('input', () => {
            if (terminalState === "START" || terminalState === "OVERFLOW") {
                mobileInput.value = '';
                textSpan.textContent = '';
                return;
            }
            textSpan.textContent = mobileInput.value;
        });

        async function runEphemeralCleanup() {
            printLocalMessage("RUNNING EPHEMERAL PURGE ENGINE...");
            const snapshot = await get(messagesRef);
            if (snapshot.exists()) {
                const nowMs = Date.now();
                const oneDayMs = 24 * 60 * 60 * 1000; 
                let purgeCount = 0;

                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data.timestamp && (nowMs - data.timestamp > oneDayMs)) {
                        remove(ref(db, `messages/${childSnapshot.key}`));
                        purgeCount++;
                    }
                });
                if (purgeCount > 0) {
                    // CHANGED: Using tree branching
                    printLocalMessage(`SUCCESS: PURGED ${purgeCount} EXPIRED DATABASE LOGS.`);
                } else {
                    printLocalMessage(`SYSTEM CHECK: ALL RECENT RECORDS VALID.`);
                }
            }
        }

        function parseAndAppendTextWithLinks(parentElement, rawString) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const parts = rawString.split(urlRegex);

            parts.forEach(part => {
                if (part.match(urlRegex)) {
                    const linkEl = document.createElement('a');
                    linkEl.className = 'term-link';
                    linkEl.textContent = part;
                    
                    linkEl.addEventListener('click', (e) => {
                        if (e.ctrlKey || e.metaKey) {
                            window.open(part, '_blank', 'noopener,noreferrer');
                        } else {
                            e.preventDefault();
                            printLocalMessage("NOTICE: HOLD CTRL KEY + CLICK TO EXECUTE LINK PATHWAY.");
                        }
                    });

                    linkEl.addEventListener('mouseenter', () => {
                        cursorTooltip.style.opacity = '1';
                    });
                    
                    linkEl.addEventListener('mousemove', (e) => {
                        cursorTooltip.style.left = (e.clientX + 12) + 'px';
                        cursorTooltip.style.top = (e.clientY + 12) + 'px';
                    });

                    linkEl.addEventListener('mouseleave', () => {
                        cursorTooltip.style.opacity = '0';
                    });

                    parentElement.appendChild(linkEl);
                } else {
                    const textNode = document.createTextNode(part);
                    parentElement.appendChild(textNode);
                }
            });
        }

        function bootFirebaseChat() {
            chatHistory.innerHTML = '';
            lastRenderedDate = null;

            if (unsubValue) unsubValue();
            if (unsubChildAdded) unsubChildAdded();

            unsubValue = onValue(messagesRef, (snapshot) => {
                if (!snapshot.exists()) {
                    chatHistory.innerHTML = '';
                    lastRenderedDate = null;
                }
            });

            unsubChildAdded = async (snapshot) => {
                const data = snapshot.val();

                if (data.date && data.date !== lastRenderedDate) {
                    const dateLine = document.createElement('div');
                    dateLine.className = 'line date-header';
                    dateLine.textContent = `[ LOG DATE: ${data.date} ]`;
                    chatHistory.appendChild(dateLine);
                    lastRenderedDate = data.date;
                }

                let displayedText = "[CORRUPT ENCRYPTED PAYLOAD]";
                if (data.encryptedPayload) {
                    displayedText = await decryptMessage(data.encryptedPayload.cipher, data.encryptedPayload.iv, data.encryptedPayload.salt);
                } else if (data.text) {
                    displayedText = data.text; 
                }

                const newLine = document.createElement('div');
                newLine.className = 'line';
                
                const promptEl = document.createElement('span');
                promptEl.className = 'prompt';
                promptEl.textContent = '> ';
                newLine.appendChild(promptEl);
                
                if (data.time) {
                    const timeEl = document.createElement('span');
                    timeEl.className = 'time';
                    timeEl.textContent = `{${data.time}} `;
                    newLine.appendChild(timeEl);
                }

                const textEl = document.createElement('span');
                textEl.className = 'text';
                
                parseAndAppendTextWithLinks(textEl, displayedText);
                newLine.appendChild(textEl);
                
                chatHistory.appendChild(newLine);
                window.scrollTo(0, document.body.scrollHeight);
            };
            
            onChildAdded(messagesRef, unsubChildAdded);
        }

        // CHANGED: Utilizing the new sys-prompt class for visual hierarchy
        function printLocalMessage(msg) {
            const newLine = document.createElement('div');
            newLine.className = 'line';
            
            const prompt = document.createElement('span');
            prompt.className = 'sys-prompt';
            prompt.textContent = '>> ';
            
            const text = document.createElement('span');
            text.className = 'text system-msg';
            
            parseAndAppendTextWithLinks(text, msg);
            
            newLine.appendChild(prompt);
            newLine.appendChild(text);

            chatHistory.appendChild(newLine);
            window.scrollTo(0, document.body.scrollHeight);
        }

        document.addEventListener('keydown', async function (e) {
            if (terminalState === "OVERFLOW") return;
            mobileInput.focus();

            if (e.ctrlKey || e.metaKey || e.altKey) return;

            if (terminalState === "START") {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    wakeTerminal();
                } else {
                    e.preventDefault();
                }
                mobileInput.value = '';
                textSpan.textContent = '';
                return;
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                const currentText = mobileInput.value.trim();

                if (currentText.startsWith('/hash ')) {
                    const wordToHash = currentText.replace('/hash ', '').toUpperCase();
                    const generatedHash = await hashText(wordToHash);
                    // CHANGED: Tree format implementation
                    printLocalMessage(`GENERATED HASH FOR [${wordToHash}]:`);
                    printLocalMessage(`${generatedHash}`);
                    mobileInput.value = '';
                    textSpan.textContent = '';
                    return;
                }

                if (terminalState === "LOGIN") {
                    const inputHash = await hashText(currentText.toUpperCase());

                    if (inputHash === SYSTEM_HASH) {
                        userPassphrase = currentText.toUpperCase(); 
                        
                        printLocalMessage("ACCESS GRANTED. MEMORY PARSING INITIALIZED...");
                        
                        await runEphemeralCleanup();
                        
                        mobileInput.value = '';
                        textSpan.textContent = '';
                        promptSpan.textContent = '> ';
                        terminalState = "CHAT";
                        setTimeout(() => { bootFirebaseChat(); }, 800);
                    } else {
                        printLocalMessage("ACCESS DENIED.");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                    return;
                }

                if (terminalState === "CONFIRM_PURGE") {
                    if (currentText.toUpperCase() === 'Y') {
                        remove(messagesRef);
                        lastRenderedDate = null;
                    } else {
                        printLocalMessage("PURGE CANCELLED.");
                    }
                    terminalState = "CHAT";
                    mobileInput.value = '';
                    textSpan.textContent = '';
                    return;
                }

                if (terminalState === "CONFIRM_EXIT") {
                    if (currentText.toUpperCase() === 'Y') {
                        if (unsubValue) unsubValue();
                        userPassphrase = ""; 

                        chatHistory.innerHTML = '';
                        lastRenderedDate = null;
                        terminalState = "START";
                        promptSpan.textContent = '';
                        mobileInput.value = '';
                        textSpan.textContent = '';

                        mainCursor.classList.add('cursor-start');
                    } else {
                        printLocalMessage("EXIT CANCELLED.");
                        terminalState = "CHAT";
                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                    return;
                }

                if (terminalState === "CHAT") {
                    if (currentText === '/help' || currentText === '/h') {
                        // CHANGED: Rebuilt as a rigid command tree
                        printLocalMessage("SYSTEM COMMANDS:");
                        printLocalMessage("/help, /h    : Show this system manual");
                        printLocalMessage("/purge       : Execute global database wipe");
                        printLocalMessage("/admin       : Retrieve secure remote payload");
                        printLocalMessage("/hash [text] : Generate SHA-256 string");
                        printLocalMessage("/bye, /exit  : Terminate secure session");
                        
                        mobileInput.value = '';
                        textSpan.textContent = '';
                        return;
                    }
                    else if (currentText === '/purge') {
                        terminalState = "CONFIRM_PURGE";
                        printLocalMessage("CONFIRM PURGE? [Y/N]");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                        return;
                    }
                    else if (currentText === '/exit' || currentText === '/bye') {
                        terminalState = "CONFIRM_EXIT";
                        printLocalMessage("CONFIRM EXIT? [Y/N]");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                        return;
                    }
                    else if (currentText === '/admin') {
                        printLocalMessage("FETCHING SECURE PAYLOAD...");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                        
                        try {
                            const targetUrl = atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2hldGh3aVEvc2l0ZWFzc2V0cy9yZWZzL2hlYWRzL21haW4vRmlsZXMvYWRtaW4udHh0");
                            const response = await fetch(targetUrl);
                            if (!response.ok) throw new Error("PAYLOAD MISSING");
                            const data = await response.text();
                            // CHANGED: Tree format implementation
                            printLocalMessage(`${data}`);
                        } catch (error) {
                            printLocalMessage("ERROR: ADMIN PAYLOAD OFFLINE.");
                        }
                        return;
                    }
                    
                    const currentTime = Date.now();
                    if (currentTime - lastMessageTime < RATE_LIMIT_MS) {
                        printLocalMessage("SYSTEM WARNING: FLOOD OVERLOAD PROTECTION ACTIVE. SLOW DOWN.");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                        return;
                    }

                    if (currentText.length > 0) {
                        lastMessageTime = currentTime; 
                        const now = new Date();

                        const year = now.getFullYear();
                        const month = String(now.getMonth() + 1).padStart(2, '0');
                        const day = String(now.getDate()).padStart(2, '0');
                        const dateString = `${day}-${month}-${year}`;

                        const hours = String(now.getHours()).padStart(2, '0');
                        const minutes = String(now.getMinutes()).padStart(2, '0');
                        const seconds = String(now.getSeconds()).padStart(2, '0');

                        const encryptedPayload = await encryptMessage(currentText);

                        push(messagesRef, {
                            encryptedPayload: encryptedPayload,
                            time: `${hours}:${minutes}:${seconds}`,
                            date: dateString,
                            timestamp: currentTime 
                        });

                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                }
            }
        });
    </script>
</body>

</html>
