<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>&lt;?&gt;</title>
    <meta property="og:title" content="&lt;?&gt;">
    <meta property="og:type" content="website">
    <meta name="twitter:title" content="&lt;?&gt;">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

    <link rel="mask-icon" href="img/safari-pinned-tab.svg" color="#25ff00">
    <meta name="msapplication-TileColor" content="#050505">
    <meta name="theme-color" content="#050505">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400&display=swap');

        body {
            background-color: #050505;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .term-green {
            color: #25ff00;
            text-shadow: 0 0 2px rgba(203, 254, 182, 0.7);
            letter-spacing: 0.06em;
            font-size: 1.3em;
            font-family: "Source Code Pro", monospace;
            font-style: normal;
            font-weight: 400;
            line-height: 1.5rem;
            text-transform: uppercase;
            word-break: break-all;
        }

        .line {
            display: block;
            word-wrap: break-word;
            margin-bottom: 4px;
            white-space: pre-wrap;
        }

        .time {
            font-style: italic;
        }

        .date-header {
            color: #25ff00;
            opacity: 0.5;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .Cursor_cursor__2bnRT {
            animation: Cursor_cursor__2bnRT 1.2s infinite;
        }

        @keyframes Cursor_cursor__2bnRT {
            0% {
                opacity: 0;
            }

            60%,
            80% {
                opacity: 1;
            }

            81%,
            100% {
                opacity: 0;
            }
        }

        .cursor-start {
            cursor: pointer;
        }

        #mobile-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
            border: none;
            padding: 0;
            margin: 0;
            font-size: 16px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="term-green" id="terminal">
        <div id="chat-history"></div>

        <div class="line active-line"><span class="prompt"></span><span class="text"></span><span id="main-cursor"
                class="Cursor_cursor__2bnRT cursor cursor-start">&lt;?&gt;</span><input type="text" id="mobile-input"
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaTjcne7xS1vjS7Tr14WfmWQmZSPhZ_lA",
            authDomain: "truth-terminal.firebaseapp.com",
            databaseURL: "https://truth-terminal-default-rtdb.firebaseio.com",
            projectId: "truth-terminal",
            storageBucket: "truth-terminal.firebasestorage.app",
            messagingSenderId: "759983527117",
            appId: "1:759983527117:web:df735315b379cd9bee0584",
            measurementId: "G-TFB06KC8N9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        const SYSTEM_HASH = "c92bcb2ea7bb84e1c56bd8e0f16b9f01fc8fb928de8ce5f71ca91cb84cc753dd";

        async function hashText(text) {
            const msgBuffer = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        let terminalState = "START";
        let unsubChildAdded = null;
        let unsubValue = null;
        let lastRenderedDate = null;

        const activeLine = document.querySelector('.active-line');
        const textSpan = activeLine.querySelector('.text');
        const promptSpan = document.querySelector('.prompt');
        const chatHistory = document.getElementById('chat-history');
        const mainCursor = document.getElementById('main-cursor');
        const mobileInput = document.getElementById('mobile-input');

        window.addEventListener('DOMContentLoaded', () => {
            mobileInput.focus();
        });

        document.addEventListener('click', () => {
            mobileInput.focus();
        });

        function wakeTerminal() {
            if (terminalState === "START") {
                terminalState = "LOGIN";
                promptSpan.textContent = '> ENTER SYSTEM KEY: ';
                mainCursor.classList.remove('cursor-start');
                mobileInput.focus();
            }
        }

        mainCursor.addEventListener('click', wakeTerminal);

        mobileInput.addEventListener('input', () => {
            textSpan.textContent = mobileInput.value;
        });

        function bootFirebaseChat() {
            chatHistory.innerHTML = '';
            lastRenderedDate = null;

            if (unsubValue) unsubValue();
            if (unsubChildAdded) unsubChildAdded();

            unsubValue = onValue(messagesRef, (snapshot) => {
                if (!snapshot.exists()) {
                    chatHistory.innerHTML = '';
                    lastRenderedDate = null;
                }
            });

            unsubChildAdded = onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();

                if (data.date && data.date !== lastRenderedDate) {
                    const dateLine = document.createElement('div');
                    dateLine.className = 'line date-header';
                    dateLine.innerHTML = `[ LOG DATE: ${data.date} ]`;
                    chatHistory.appendChild(dateLine);
                    lastRenderedDate = data.date;
                }

                const msgTime = data.time ? '<span class="time">{' + data.time + '}</span> ' : '';
                const newLine = document.createElement('div');
                newLine.className = 'line';
                newLine.innerHTML = '<span class="prompt">&gt; </span>' + msgTime + '<span class="text">' + data.text + '</span>';
                chatHistory.appendChild(newLine);
                window.scrollTo(0, document.body.scrollHeight);
            });
        }

        function printLocalMessage(msg) {
            const newLine = document.createElement('div');
            newLine.className = 'line';
            newLine.innerHTML = '<span class="prompt">&gt; </span><span class="text">' + msg + '</span>';
            chatHistory.appendChild(newLine);
            window.scrollTo(0, document.body.scrollHeight);
        }

        document.addEventListener('keydown', async function (e) {

            mobileInput.focus();

            if (e.ctrlKey || e.metaKey || e.altKey) return;

            if (terminalState === "START") {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    wakeTerminal();
                } else {
                    e.preventDefault();
                }
                mobileInput.value = '';
                textSpan.textContent = '';
                return;
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                const currentText = mobileInput.value.trim();

                if (currentText.startsWith('/hash ')) {
                    const wordToHash = currentText.replace('/hash ', '').toUpperCase();
                    const generatedHash = await hashText(wordToHash);
                    printLocalMessage(`GENERATED HASH FOR [${wordToHash}]:`);
                    printLocalMessage(generatedHash);
                    mobileInput.value = '';
                    textSpan.textContent = '';
                    return;
                }

                if (terminalState === "LOGIN") {
                    const inputHash = await hashText(currentText.toUpperCase());

                    if (inputHash === SYSTEM_HASH) {
                        printLocalMessage("ACCESS GRANTED. CONNECTING TO SECURE SERVER...");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                        promptSpan.textContent = '> ';
                        terminalState = "CHAT";
                        setTimeout(() => { bootFirebaseChat(); }, 1200);
                    } else {
                        printLocalMessage("ACCESS DENIED.");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                    return;
                }

                if (terminalState === "CONFIRM_CLEAR") {
                    if (currentText.toUpperCase() === 'Y') {
                        remove(messagesRef);
                        lastRenderedDate = null;
                    } else {
                        printLocalMessage("CLEAR CANCELLED.");
                    }
                    terminalState = "CHAT";
                    mobileInput.value = '';
                    textSpan.textContent = '';
                    return;
                }

                if (terminalState === "CONFIRM_EXIT") {
                    if (currentText.toUpperCase() === 'Y') {
                        if (unsubValue) unsubValue();
                        if (unsubChildAdded) unsubChildAdded();

                        chatHistory.innerHTML = '';
                        lastRenderedDate = null;
                        terminalState = "START";
                        promptSpan.textContent = '';
                        mobileInput.value = '';
                        textSpan.textContent = '';

                        mainCursor.classList.add('cursor-start');
                    } else {
                        printLocalMessage("EXIT CANCELLED.");
                        terminalState = "CHAT";
                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                    return;
                }

                if (terminalState === "CHAT") {
                    if (currentText === '/clear') {
                        terminalState = "CONFIRM_CLEAR";
                        printLocalMessage("CONFIRM CLEAR? [Y/N]");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                    else if (currentText === '/exit') {
                        terminalState = "CONFIRM_EXIT";
                        printLocalMessage("CONFIRM EXIT? [Y/N]");
                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                    else if (currentText === '/admin') {
                        printLocalMessage("FETCHING SECURE PAYLOAD...");
                        mobileInput.value = '';
                        textSpan.textContent = '';

                        try {
                            // The encoded URL points exactly to admin
                            const targetUrl = atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2hldGh3aVEvc2l0ZWFzc2V0cy9yZWZzL2hlYWRzL21haW4vRmlsZXMvYWRtaW4udHh0");
                            const response = await fetch(targetUrl);

                            if (!response.ok) throw new Error("PAYLOAD MISSING");

                            const data = await response.text();
                            printLocalMessage(data);
                        } catch (error) {
                            printLocalMessage("ERROR: ADMIN PAYLOAD OFFLINE.");
                        }
                    }
                    else if (currentText.length > 0) {
                        const now = new Date();

                        const year = now.getFullYear();
                        const month = String(now.getMonth() + 1).padStart(2, '0');
                        const day = String(now.getDate()).padStart(2, '0');
                        const dateString = `${day}-${month}-${year}`;

                        const hours = String(now.getHours()).padStart(2, '0');
                        const minutes = String(now.getMinutes()).padStart(2, '0');
                        const seconds = String(now.getSeconds()).padStart(2, '0');

                        push(messagesRef, {
                            text: currentText,
                            time: `${hours}:${minutes}:${seconds}`,
                            date: dateString
                        });

                        mobileInput.value = '';
                        textSpan.textContent = '';
                    }
                }
            }
        });
    </script>
</body>

</html>
