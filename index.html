<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400&display=swap');

        body {
            background-color: #050505;
            margin: 0;
            padding: 20px;

        /* Floating high z-index operator counter */
        #floating-counter {
            display: none;
            position: fixed;
            top: 20px;

            z-index: 9999;
            background-color: #050505;
            padding: 4px 8px;

        .term-green {
            color: #25ff00;

            font-size: 0.65rem;
            border: 1px solid #25ff00;
            border-radius: 2px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none; 
            z-index: 9999;
            transition: opacity 0.1s ease;
        }

        .Cursor_cursor__2bnRT { animation: Cursor_cursor__2bnRT 1.2s infinite; }
        @keyframes Cursor_cursor__2bnRT { 0% { opacity: 0; } 60%, 80% { opacity: 1; } 81%, 100% { opacity: 0; } }
        .cursor-start { cursor: pointer; }

        #mobile-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
            border: none;
            padding: 0;
            margin: 0;

<body>
    <div id="cursor-tooltip">CTRL + CLICK TO OPEN LINK</div>

    <div id="floating-counter"></div>

    <div class="term-green" id="terminal">
        <div id="chat-history"></div>
        <div class="line active-line"><span class="prompt"></span><span class="text"></span><span id="main-cursor" class="Cursor_cursor__2bnRT cursor cursor-start">&lt;?&gt;</span><input type="text" id="mobile-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onValue, get, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaTjcne7xS1vjS7Tr14WfmWQmZSPhZ_lA",
            authDomain: "truth-terminal.firebaseapp.com",
            databaseURL: "https://truth-terminal-default-rtdb.firebaseio.com",
            projectId: "truth-terminal",
            storageBucket: "truth-terminal.firebasestorage.app",
            messagingSenderId: "759983527117",
            appId: "1:759983527117:web:df735315b379cd9bee0584",
            measurementId: "G-TFB06KC8N9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // =====================================================================
        // 1. GLOBAL CONSTANTS
        // =====================================================================
        const CONFIG = {
            MAX_OPERATORS: 10,
            ROOM_LIFETIME_MS: 24 * 60 * 60 * 1000, 
            SESSION_TIMEOUT_MS: 15 * 60 * 1000,    
            HEARTBEAT_INTERVAL_MS: 45000,          
            WARNING_TIME_MS: 10 * 60 * 1000,       
            SCHEMA_VERSION: 2,
            TRANSIENT_MSG_MS: 2 * 1000 // 2 Seconds before system UI wipe
        };

        let terminalState = "START";
        let activeAccessPhrase = "";
        let activeRoomHash = "";
        let activeRoomID = "";

        const activeLine = document.querySelector('.active-line');
        const textSpan = activeLine.querySelector('.text');
        const promptSpan = activeLine.querySelector('.prompt'); 
        const chatHistory = document.getElementById('chat-history');
        const mainCursor = document.getElementById('main-cursor');
        const mobileInput = document.getElementById('mobile-input');
        const cursorTooltip = document.getElementById('cursor-tooltip'); 
        const floatingCounter = document.getElementById('floating-counter');

        const originalTitle = document.title;
        let alertInterval = null;
        let isBlinking = false;
        let sessionStartTime = 0; 

        // =====================================================================
        // 2. UTILITY FUNCTIONS
        // =====================================================================
        function isValidAccessPhrase(phrase) { return /^[a-zA-Z0-9]+$/.test(phrase); }
        function generateDisplayRoomID(roomHash) { return roomHash.substring(0, 6).toUpperCase(); }

        // =====================================================================
        // 3. CRYPTOGRAPHY
        // =====================================================================
        async function hashText(text) {
            const msgBuffer = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function deriveUniqueKey(passphrase, saltBytes) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: saltBytes, iterations: 100000, hash: "SHA-256" },
                keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function encryptMessage(plaintext) {
            const saltBytes = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const messageKey = await deriveUniqueKey(activeAccessPhrase, saltBytes);
            const encoded = new TextEncoder().encode(plaintext);
            const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, messageKey, encoded);
            return {
                cipher: btoa(String.fromCharCode(...new Uint8Array(ciphertext))),
                iv: btoa(String.fromCharCode(...iv)),
                salt: btoa(String.fromCharCode(...saltBytes))
            };
        }

        async function decryptMessage(cipherB64, ivB64, saltB64) {
            try {
                const ciphertext = new Uint8Array(atob(cipherB64).split("").map(c => c.charCodeAt(0)));
                const iv = new Uint8Array(atob(ivB64).split("").map(c => c.charCodeAt(0)));
                const saltBytes = new Uint8Array(atob(saltB64).split("").map(c => c.charCodeAt(0)));
                const messageKey = await deriveUniqueKey(activeAccessPhrase, saltBytes);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, messageKey, ciphertext);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[UNAUTHORIZED: ENCRYPTED_LOG_GIBBERISH]";
            }
        }

        // =====================================================================
        // 4. FIREBASE & ROOM MANAGEMENT
        // =====================================================================
        let mySessionId = sessionStorage.getItem('tt_session_id') || null;
        let heartbeatTimer = null;
        let mySessionRef = null;
        let messagesRef = null;
        let unsubChildAdded = null;
        let unsubValue = null;
        let warningTimer = null;
        let confirmPrompt = null;
        
        async function joinOrCreateRoom() {
            const roomRef = ref(db, `rooms/${activeRoomHash}`);
            const metadataRef = ref(db, `rooms/${activeRoomHash}/metadata`);
            const sessionsRef = ref(db, `rooms/${activeRoomHash}/sessions`);
            messagesRef = ref(db, `rooms/${activeRoomHash}/messages`);

            const metaSnap = await get(metadataRef);
            const now = Date.now();
            let roomExpiresAt = 0;

            if (!metaSnap.exists()) {
                roomExpiresAt = now + CONFIG.ROOM_LIFETIME_MS;
                await set(metadataRef, { createdAt: now, expiresAt: roomExpiresAt, schemaVersion: CONFIG.SCHEMA_VERSION });
            } else {
                const meta = metaSnap.val();
                if (now >= meta.expiresAt) {
                    await remove(roomRef);
                    roomExpiresAt = now + CONFIG.ROOM_LIFETIME_MS;
                    await set(metadataRef, { createdAt: now, expiresAt: roomExpiresAt, schemaVersion: CONFIG.SCHEMA_VERSION });
                } else {
                    roomExpiresAt = meta.expiresAt;
                }
            }

            const sessSnap = await get(sessionsRef);
            if (sessSnap.exists()) {
                const sessions = sessSnap.val();
                let activeCount = 0;
                for (const [sId, sData] of Object.entries(sessions)) {
                    if (now - sData.lastSeen > CONFIG.SESSION_TIMEOUT_MS) remove(ref(db, `rooms/${activeRoomHash}/sessions/${sId}`));
                    else activeCount++;
                }
                if (!mySessionId && activeCount >= CONFIG.MAX_OPERATORS) {
                    printLocalMessage(`[SYSTEM] CONNECTION REFUSED: ROOM CAPACITY REACHED (10/10).`, true);
                    return false;
                }
            }

            if (!mySessionId) {
                mySessionId = Math.random().toString(36).substring(2, 15);
                sessionStorage.setItem('tt_session_id', mySessionId);
            }
            
            mySessionRef = ref(db, `rooms/${activeRoomHash}/sessions/${mySessionId}`);
            
            await set(mySessionRef, { lastSeen: now });
            onDisconnect(mySessionRef).remove();

            heartbeatTimer = setInterval(() => { set(mySessionRef, { lastSeen: Date.now() }); }, CONFIG.HEARTBEAT_INTERVAL_MS);

            const timeUntilWarning = (roomExpiresAt - CONFIG.WARNING_TIME_MS) - Date.now();
            if (timeUntilWarning > 0) {
                warningTimer = setTimeout(() => {
                    printLocalMessage("[WARNING]\nROOM WILL SELF-DESTRUCT IN 10 MINUTES", false); // Keep warnings permanent
                }, timeUntilWarning);
            }

            startPresenceListener();
            return true;
        }

        // =====================================================================
        // 5. PRESENCE MANAGEMENT
        // =====================================================================
        let currentOperatorCount = 1;
        let unsubPresence = null;

        function startPresenceListener() {
            const sessRef = ref(db, `rooms/${activeRoomHash}/sessions`);
            unsubPresence = onValue(sessRef, (snap) => {
                if (!snap.exists()) return;
                let count = 0;
                const now = Date.now();
                for (const sData of Object.values(snap.val())) {
                    if (now - sData.lastSeen <= CONFIG.SESSION_TIMEOUT_MS) count++;
                }
                currentOperatorCount = count;
                floatingCounter.textContent = `${count}/${CONFIG.MAX_OPERATORS}`;
                
                if (count <= 4) floatingCounter.style.color = '#25ff00';
                else if (count <= 7) floatingCounter.style.color = '#ffff00';
                else floatingCounter.style.color = '#ff0000';
            });
        }

        // =====================================================================
        // 6. TERMINAL RENDERING & URL PARSING
        // =====================================================================
        function parseAndAppendTextWithLinks(parentElement, rawString) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const parts = rawString.split(urlRegex);
            parts.forEach(part => {
                if (part.match(urlRegex)) {
                    const linkEl = document.createElement('a');
                    linkEl.className = 'term-link';
                    linkEl.textContent = part;
                    linkEl.addEventListener('click', (e) => {
                        if (e.ctrlKey || e.metaKey) window.open(part, '_blank', 'noopener,noreferrer');
                        else { e.preventDefault(); printLocalMessage("[NOTICE] HOLD CTRL KEY + CLICK TO EXECUTE LINK PATHWAY.", true); }
                    });
                    linkEl.addEventListener('mouseenter', () => cursorTooltip.style.opacity = '1');
                    linkEl.addEventListener('mousemove', (e) => { cursorTooltip.style.left = (e.clientX + 12) + 'px'; cursorTooltip.style.top = (e.clientY + 12) + 'px'; });
                    linkEl.addEventListener('mouseleave', () => cursorTooltip.style.opacity = '0');
                    parentElement.appendChild(linkEl);
                } else {
                    parentElement.appendChild(document.createTextNode(part));
                }
            });
        }

        function insertMessageChronologically(newLine, timestamp) {
            newLine.setAttribute('data-timestamp', timestamp);
            const existingLines = Array.from(chatHistory.children);
            let inserted = false;
            
            for (let i = existingLines.length - 1; i >= 0; i--) {
                const lineTime = parseInt(existingLines[i].getAttribute('data-timestamp') || 0);
                if (timestamp >= lineTime) {
                    existingLines[i].after(newLine);
                    inserted = true;
                    break;
                }
            }
            if (!inserted) chatHistory.prepend(newLine);
        }

        // Added transient flag to auto-remove clutter
        function printLocalMessage(msg, transient = false) {
            const newLine = document.createElement('div');
            newLine.className = 'line';

            const prompt = document.createElement('span');
            prompt.className = 'sys-prompt';
            prompt.textContent = '>> ';

            const text = document.createElement('span');
            text.className = 'text system-msg';
            parseAndAppendTextWithLinks(text, msg);

            newLine.appendChild(prompt);
            newLine.appendChild(text);

            insertMessageChronologically(newLine, Date.now());
            window.scrollTo(0, document.body.scrollHeight);

            if (transient) {
                setTimeout(() => {
                    newLine.style.transition = "opacity 1s ease";
                    newLine.style.opacity = "0";
                    setTimeout(() => newLine.remove(), 1000);
                }, CONFIG.TRANSIENT_MSG_MS);
            }

            return newLine;
        }

        function wakeTerminal() {
            if (terminalState === "START") {
                terminalState = "LOGIN";
                promptSpan.textContent = '> ENTER ACCESS PHRASE: ';
                mainCursor.classList.remove('cursor-start');
                mobileInput.focus();
            }
        }

        // =====================================================================
        // 7. COMMAND PARSER
        // =====================================================================
        async function handleCommand(cmd) {
            const command = cmd.toUpperCase();
            
            if (command === '/HELP' || command === '/H') {
                printLocalMessage("SYSTEM COMMANDS:", false);
                printLocalMessage("/STATUS  : Display live room diagnostics", false);
                printLocalMessage("/PURGE   : Execute permanent message wipe", false);
                printLocalMessage("/CLEAR   : Clear local terminal display", false);
                printLocalMessage("/ADMIN   : Authenticate creator payload", false);
                printLocalMessage("/EXIT    : Terminate secure session", false);
                return true;
            }
            if (command === '/CLEAR' || command === '/CLS') {
                chatHistory.innerHTML = '';
                return true;
            }
            if (command === '/ADMIN') {
                printLocalMessage("[SYSTEM] FETCHING SECURE PAYLOAD...", true);
                try {
                    const targetUrl = atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2hldGh3aVEvc2l0ZWFzc2V0cy9yZWZzL2hlYWRzL21haW4vRmlsZXMvYWRtaW4udHh0");
                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error("PAYLOAD MISSING");
                    const data = await response.text();
                    printLocalMessage(`${data}`, false);
                } catch (error) {
                    printLocalMessage("[ERROR] ADMIN PAYLOAD OFFLINE.", false);
                }
                return true;
            }
            if (command === '/PURGE') {
                confirmPrompt = printLocalMessage("[SYSTEM] CONFIRM PURGE? [Y/N]", false);
                terminalState = "CONFIRM_PURGE";
                return true;
            }
            if (command === '/STATUS') {
                const metaSnap = await get(ref(db, `rooms/${activeRoomHash}/metadata`));
                if (metaSnap.exists()) {
                    const meta = metaSnap.val();
                    const now = Date.now();
                    const ageMs = now - meta.createdAt;
                    const ageH = Math.floor(ageMs / 3600000).toString().padStart(2, '0');
                    const ageM = Math.floor((ageMs % 3600000) / 60000).toString().padStart(2, '0');
                    const remMs = Math.max(0, meta.expiresAt - now);
                    const remH = Math.floor(remMs / 3600000).toString().padStart(2, '0');
                    const remM = Math.floor((remMs % 3600000) / 60000).toString().padStart(2, '0');

                    printLocalMessage(`ROOM           ${activeRoomID}`, false);
                    printLocalMessage(`OPERATORS      ${currentOperatorCount}/${CONFIG.MAX_OPERATORS}`, false);
                    printLocalMessage(`ROOM AGE       ${ageH}h ${ageM}m`, false);
                    printLocalMessage(`TIME REMAINING ${remH}h ${remM}m`, false);
                }
                return true;
            }
            if (command === '/EXIT' || command === '/BYE') {
                printLocalMessage("[SYSTEM] CONFIRM EXIT? [Y/N]", false);
                terminalState = "CONFIRM_EXIT";
                return true;
            }
            return false;
        }

        async function executeExit() {
            clearInterval(heartbeatTimer);
            clearTimeout(warningTimer);
            if (unsubChildAdded) unsubChildAdded();
            if (unsubValue) unsubValue();
            if (unsubPresence) unsubPresence();
            
            await remove(mySessionRef);
            
            const sessSnap = await get(ref(db, `rooms/${activeRoomHash}/sessions`));
            const msgSnap = await get(messagesRef);
            
            let activeCount = 0;
            if (sessSnap.exists()) {
                const now = Date.now();
                for (const sData of Object.values(sessSnap.val())) {
                    if (now - sData.lastSeen <= CONFIG.SESSION_TIMEOUT_MS) activeCount++;
                }
            }
            
            if (activeCount === 0 && !msgSnap.exists()) {
                await remove(ref(db, `rooms/${activeRoomHash}`));
            }
            
            sessionStorage.removeItem('tt_access_phrase');
            sessionStorage.removeItem('tt_session_id');

            terminalState = "START";
            activeAccessPhrase = "";
            activeRoomHash = "";
            activeRoomID = "";
            mySessionId = null;
            floatingCounter.style.display = 'none';
            chatHistory.innerHTML = '';
            printLocalMessage("[SYSTEM] OPERATOR DISCONNECTED.", true);
            promptSpan.textContent = '';
            mainCursor.classList.add('cursor-start');
        }

        // =====================================================================
        // 8. CHAT ENGINE & NOTIFICATIONS
        // =====================================================================
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                clearInterval(alertInterval);
                document.title = originalTitle;
                isBlinking = false;
            }
        });

        function bootFirebaseChat() {
            sessionStartTime = Date.now();
            
            if (unsubChildAdded) unsubChildAdded();
            if (unsubValue) unsubValue();

            unsubValue = onValue(messagesRef, (snapshot) => {
                if (!snapshot.exists()) {
                    const msgLines = chatHistory.querySelectorAll('.remote-msg');
                    msgLines.forEach(line => line.remove());
                }
            });

            // FIXED: Properly attach the callback so we capture the true unsubscribe function
            const childAddedCallback = async (snapshot) => {
                const data = snapshot.val();
                const isNearBottom = (document.body.scrollHeight - window.scrollY - window.innerHeight) < 150;

                let displayedText = "[CORRUPT ENCRYPTED PAYLOAD]";
                if (data.encryptedPayload) {
                    displayedText = await decryptMessage(data.encryptedPayload.cipher, data.encryptedPayload.iv, data.encryptedPayload.salt);
                }

                const newLine = document.createElement('div');
                newLine.className = 'line remote-msg'; 
                
                const promptEl = document.createElement('span');
                promptEl.className = 'prompt';
                promptEl.textContent = '> ';
                newLine.appendChild(promptEl);
                
                if (data.time) {
                    const timeEl = document.createElement('span');
                    timeEl.className = 'time';
                    timeEl.textContent = `{${data.time}} `;
                    newLine.appendChild(timeEl);
                }

                const textEl = document.createElement('span');
                textEl.className = 'text';
                parseAndAppendTextWithLinks(textEl, displayedText);
                newLine.appendChild(textEl);
                
                insertMessageChronologically(newLine, data.timestamp || Date.now());
                if (isNearBottom) window.scrollTo(0, document.body.scrollHeight);

                if (data.timestamp && data.timestamp > sessionStartTime && document.hidden && !isBlinking) {
                    isBlinking = true;
                    let showNew = true;
                    alertInterval = setInterval(() => {
                        document.title = showNew ? "[* New Message *]" : originalTitle;
                        showNew = !showNew;
                    }, 1000);
                }
            };
            unsubChildAdded = onChildAdded(messagesRef, childAddedCallback);
        }

        // =====================================================================
        // 9. INPUT HANDLING
        // =====================================================================
        mainCursor.addEventListener('click', wakeTerminal);
        document.addEventListener('click', () => { if(terminalState !== "START" && terminalState !== "OVERFLOW") mobileInput.focus(); });

        mobileInput.addEventListener('input', () => {
            if (terminalState === "START") { mobileInput.value = ''; textSpan.textContent = ''; return; }
            textSpan.textContent = mobileInput.value;
        });

        document.addEventListener('keydown', async function (e) {
            if(terminalState !== "START") mobileInput.focus();
            if (e.ctrlKey || e.metaKey || e.altKey) return;

            if (terminalState === "START") {
                if (e.key === 'Enter') e.preventDefault(), wakeTerminal();
                else e.preventDefault();
                mobileInput.value = ''; textSpan.textContent = '';
                return;
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                const currentText = mobileInput.value.trim();

                if (terminalState === "CONFIRM_PURGE") {

                    if (confirmPrompt) {
                        confirmPrompt.remove();
                        confirmPrompt = null;
                    }

                    if (currentText.toUpperCase() === 'Y') {
                        await remove(messagesRef);
                        printLocalMessage("[SYSTEM] ROOM HISTORY PURGED", true);
                    } else {
                        printLocalMessage("[SYSTEM] PURGE CANCELLED", true);
                    }

                    terminalState = "CHAT";
                    mobileInput.value = '';
                    textSpan.textContent = '';
                    return;
                }

                if (terminalState === "CONFIRM_EXIT") {
                    if (currentText.toUpperCase() === 'Y') {
                        executeExit();
                    } else {
                        printLocalMessage("[SYSTEM] EXIT CANCELLED", true);
                        terminalState = "CHAT";
                    }
                    mobileInput.value = ''; textSpan.textContent = '';
                    return;
                }

                if (terminalState === "LOGIN") {
                    if (!isValidAccessPhrase(currentText)) {
                        printLocalMessage("[ERROR] INVALID FORMAT. USE ALPHANUMERIC CHARACTERS ONLY.", true);
                        mobileInput.value = ''; textSpan.textContent = '';
                        return;
                    }

                    activeAccessPhrase = currentText;
                    sessionStorage.setItem('tt_access_phrase', activeAccessPhrase);
                    
                    activeRoomHash = await hashText(activeAccessPhrase);
                    activeRoomID = generateDisplayRoomID(activeRoomHash);

                    printLocalMessage(`[SYSTEM] ACCESS PHRASE ACCEPTED.`, true);
                    printLocalMessage(`[SYSTEM] TARGETING ROOM [${activeRoomID}]...`, true);
                    
                    const joined = await joinOrCreateRoom();
                    
                    if (joined) {
                        printLocalMessage(`[SYSTEM] OPERATOR CONNECTED.`, true);
                        floatingCounter.style.display = 'block';
                        mobileInput.value = ''; textSpan.textContent = '';
                        promptSpan.textContent = '> ';
                        terminalState = "CHAT";
                        bootFirebaseChat();
                    } else {
                        sessionStorage.removeItem('tt_access_phrase');
                        mobileInput.value = ''; textSpan.textContent = '';
                        promptSpan.textContent = '> ENTER ACCESS PHRASE: ';
                        terminalState = "LOGIN";
                    }
                    return;
                }

                if (terminalState === "CHAT" && currentText.length > 0) {
                    if (currentText.startsWith('/')) {
                        const isCommand = await handleCommand(currentText);
                        if (isCommand) {
                            mobileInput.value = ''; textSpan.textContent = '';
                            return;
                        }
                    }

                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const seconds = String(now.getSeconds()).padStart(2, '0');

                    const encryptedPayload = await encryptMessage(currentText);

                    push(messagesRef, {
                        encryptedPayload: encryptedPayload,
                        time: `${hours}:${minutes}:${seconds}`,
                        timestamp: Date.now()
                    });

                    mobileInput.value = ''; textSpan.textContent = '';
                }
            }
        });

        // =====================================================================
        // 10. INITIALIZATION & SESSION RESTORE
        // =====================================================================
        window.addEventListener('DOMContentLoaded', async () => { 
            mobileInput.focus(); 
            
            const savedPhrase = sessionStorage.getItem('tt_access_phrase');
            if (savedPhrase) {
                mainCursor.classList.remove('cursor-start');
                activeAccessPhrase = savedPhrase;
                activeRoomHash = await hashText(activeAccessPhrase);
                activeRoomID = generateDisplayRoomID(activeRoomHash);
                
                printLocalMessage(`[SYSTEM] RESTORING SESSION FOR ROOM [${activeRoomID}]...`, true);
                
                const joined = await joinOrCreateRoom();
                if (joined) {
                    printLocalMessage(`[SYSTEM] OPERATOR RECONNECTED.`, true);
                    floatingCounter.style.display = 'block';
                    promptSpan.textContent = '> ';
                    terminalState = "CHAT";
                    bootFirebaseChat();
                } else {
                    sessionStorage.removeItem('tt_access_phrase');
                    sessionStorage.removeItem('tt_session_id');
                    terminalState = "START";
                }
            }
        });
    </script>
</body>
</html>
